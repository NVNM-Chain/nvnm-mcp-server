apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nvnm-mcp-server
  labels:
    app.kubernetes.io/name: nvnm-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: inveniam
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nvnm-mcp-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
