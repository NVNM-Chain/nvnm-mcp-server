apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvnm-mcp-server
  labels:
    app.kubernetes.io/name: nvnm-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: nvnm-chain
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nvnm-mcp-server
      app.kubernetes.io/component: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvnm-mcp-server
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/part-of: nvnm-chain
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        # Confine syscalls to the runtime default profile. Present in the Helm
        # chart (values.yaml) but previously omitted here -- required for the
        # Pod Security Standards "restricted" profile (K8-2).
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nvnm-mcp-server
          # ":latest" here is OVERRIDDEN by the `images:` transformer in
          # kustomization.yaml, which pins the tag (interim) or digest (SC-1) at
          # a single point -- edit the pin there, not this line. ":latest" is a
          # mutable tag; a registry-side overwrite or supply-chain push would
          # otherwise silently propagate on every pod restart. The Dockerfile
          # already digest-pins both base images; the kustomize pin closes the
          # remaining link. Production should pin a digest and enforce signature
          # verification at admission (see kustomization.yaml).
          image: ghcr.io/nvnm-chain/nvnm-mcp-server:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--transport"
            - "http"
          ports:
            - name: mcp
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          envFrom:
            # Non-sensitive values: chain ID, addresses, ports, timeouts.
            - configMapRef:
                name: nvnm-mcp-server-config
            # Sensitive values: RPC URL, MCP_API_KEY*, ADMIN_API_KEY,
            # FusionAuth IDs. See secret.yaml.example. Operators that
            # use FusionAuth instead of file-backed API keys can omit
            # the keys-volume mount below.
            - secretRef:
                name: nvnm-mcp-server-secret
                optional: true
          volumeMounts:
            # The API keys file is mounted read-only from a separate
            # Secret. The mount path matches MCP_API_KEYS_FILE in the
            # Secret. Optional so deployments using AUTH_PROVIDER=
            # fusionauth do not need the keys Secret.
            - name: api-keys
              mountPath: /var/run/secrets/nvnm
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: api-keys
          secret:
            secretName: nvnm-mcp-server-keys # pragma: allowlist secret -- K8s API field name, not a credential value
            optional: true
            defaultMode: 256 # 0o400 decimal: read-only for owner only
