apiVersion: v1
kind: ConfigMap
metadata:
  name: inveniam-mcp-server-config
  labels:
    app.kubernetes.io/name: inveniam-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: inveniam
data:
  # Non-sensitive operational config. Anything that may carry a
  # credential (RPC URL with embedded API key, FusionAuth secrets, MCP
  # API keys) belongs in the companion Secret -- see
  # secret.yaml.example. Both are pulled via envFrom in deployment.yaml.

  # Chain configuration. Note: INVENIAM_CHAIN_ID will be renamed to
  # NVNM_CHAIN_ID in Phase 8.9 (breaking, hard cut). Operators should
  # plan to swap when they bump the server version that ships 8.9.
  INVENIAM_CHAIN_ID: "787111" # current testnet (nvnm-testnet-1)
  ANCHOR_ABI_PATH: "/app/abi/anchoring.json"

  # Transports and ports.
  MCP_TRANSPORT: "http"
  MCP_HTTP_ADDR: ":8080"
  METRICS_ADDR: ":9090"
  # Admin REST defaults to 127.0.0.1:8081 -- the admin key is the
  # master key and should not be reachable cluster-wide by default.
  # Set ADMIN_API_ADDR explicitly (and pair with a NetworkPolicy) if
  # in-cluster admin access is required.

  # Operational toggles.
  LOG_LEVEL: "info"
  REQUEST_TIMEOUT: "15s"
  ENABLE_WRITE_TOOLS: "false"
  WRITE_APPROVAL_DEFAULT: "required"
  ENABLE_PROMETHEUS: "true"

  # Telemetry. OTLP_INSECURE=false is the secure default; set to "true"
  # only for sidecar/localhost collectors that do not support TLS.
  OTLP_INSECURE: "false"

  # Resilience tuning.
  RPC_MAX_RETRIES: "3"
  RPC_RATE_LIMIT: "100"
  CIRCUIT_BREAKER_THRESHOLD: "5"

  # Origin guard. Production deployments must enumerate trusted MCP
  # client origins -- a missing value falls back to localhost-only,
  # which blocks legitimate browser-based callers.
  # NVNM_ALLOWED_ORIGINS: "https://claude.ai,https://mcp.example.com"

  # Trust X-Forwarded-For from the reverse proxy when deriving the
  # pre-auth failure-rate limiter's source IP. Set to "true" ONLY when
  # the proxy strips client-supplied XFF entries.
  # NVNM_TRUST_PROXY_HEADERS: "true"
