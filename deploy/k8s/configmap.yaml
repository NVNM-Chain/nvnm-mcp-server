apiVersion: v1
kind: ConfigMap
metadata:
  name: inveniam-mcp-server-config
  labels:
    app.kubernetes.io/name: inveniam-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: inveniam
data:
  # Required: replace with your chain RPC URL (http or https).
  INVENIAM_EVM_RPC_URL: "https://rpc.example.com"
  INVENIAM_CHAIN_ID: "58887"
  ANCHOR_ABI_PATH: "/app/abi/anchoring.json"
  MCP_TRANSPORT: "http"
  LOG_LEVEL: "info"
  REQUEST_TIMEOUT: "15s"
  ENABLE_WRITE_TOOLS: "false"
  ENABLE_PROMETHEUS: "true"
  METRICS_ADDR: ":9090"
  MCP_HTTP_ADDR: ":8080"
  RPC_MAX_RETRIES: "3"
  RPC_RATE_LIMIT: "100"
  CIRCUIT_BREAKER_THRESHOLD: "5"
