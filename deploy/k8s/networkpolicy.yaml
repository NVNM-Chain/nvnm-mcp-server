apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nvnm-mcp-server
  labels:
    app.kubernetes.io/name: nvnm-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: inveniam
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nvnm-mcp-server
      app.kubernetes.io/component: mcp-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # MCP HTTP -- restrict to pods with the "mcp-client" label.
    # Adjust the namespaceSelector / podSelector to match your cluster.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: mcp-client
      ports:
        - protocol: TCP
          port: 8080
    # Health/metrics -- allow Prometheus scraper and kubelet probes.
    - from: []
      ports:
        - protocol: TCP
          port: 9090
    # Admin REST (port 8081) is INTENTIONALLY OMITTED. The admin key
    # creates API keys, sets WriteApproval=auto, and assigns admin
    # roles -- it is the master key. The server binds the admin
    # listener to 127.0.0.1 by default; operators that flip
    # ADMIN_API_ADDR=:8081 for in-cluster admin access should add a
    # narrow ingress rule here scoped to ops tooling, NOT "from: []".
    # Example:
    #   - from:
    #       - namespaceSelector:
    #           matchLabels:
    #             kubernetes.io/metadata.name: ops-tooling
    #         podSelector:
    #           matchLabels:
    #             app.kubernetes.io/name: inveniam-keymgmt
    #     ports:
    #       - protocol: TCP
    #         port: 8081
  egress:
    # Outbound to EVM RPC (HTTPS)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Outbound to OTLP collector (gRPC, typically 4317)
    - to: []
      ports:
        - protocol: TCP
          port: 4317
    # DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
