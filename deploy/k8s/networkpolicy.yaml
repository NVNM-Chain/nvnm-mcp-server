apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nvnm-mcp-server
  labels:
    app.kubernetes.io/name: nvnm-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: nvnm-chain
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nvnm-mcp-server
      app.kubernetes.io/component: mcp-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # MCP HTTP -- restrict to pods with the "mcp-client" label.
    # Adjust the namespaceSelector / podSelector to match your cluster.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: mcp-client
      ports:
        - protocol: TCP
          port: 8080
    # Metrics -- scope to the monitoring namespace rather than "from: []"
    # (which exposed the unauthenticated /metrics endpoint to every pod in the
    # cluster). Adjust the namespaceSelector label to match where your
    # Prometheus runs (K8-1). Kubelet liveness/readiness probes on this port
    # originate from the node, not a pod, and bypass NetworkPolicy in most CNIs;
    # if your CNI enforces policy on node-sourced traffic, add a rule admitting
    # the node CIDR to port 9090.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
    # Admin REST (port 8081) is INTENTIONALLY OMITTED. The admin key
    # creates API keys, sets WriteApproval=auto, and assigns admin
    # roles -- it is the master key. The server binds the admin
    # listener to 127.0.0.1 by default; operators that flip
    # ADMIN_API_ADDR=:8081 for in-cluster admin access should add a
    # narrow ingress rule here scoped to their ops tooling
    # (namespaceSelector + podSelector), NOT "from: []".
  egress:
    # Outbound to EVM RPC (HTTPS). Destination is operator-specific (an external
    # endpoint), so "to: []" is left as the default -- but harden it: restrict
    # to your RPC provider's CIDR via an ipBlock once known, so a compromised pod
    # cannot exfiltrate to arbitrary HTTPS hosts (K8-1).
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Outbound to OTLP collector (gRPC, typically 4317). If your collector runs
    # in-cluster, scope this to its namespaceSelector; if external, restrict to
    # its CIDR via ipBlock rather than "to: []" (K8-1).
    - to: []
      ports:
        - protocol: TCP
          port: 4317
    # DNS resolution -- scoped to kube-system (kube-dns / CoreDNS) rather than
    # "to: []" (K8-1). Adjust if your cluster DNS runs in another namespace.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
