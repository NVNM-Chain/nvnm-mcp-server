# PrometheusRule for Prometheus Operator (monitoring.coreos.com/v1).
# Ensure the Prometheus instance selects this rule via ruleSelector labels
# (e.g. prometheus: kube-prometheus).
#
# namespace: "monitoring" below is a common default for kube-prometheus;
# patch metadata.namespace (or use kustomize/helm) when your rules live elsewhere.
#
# runbook_url annotations use docs/RUNBOOK.md section anchors; replace the URL prefix
# with your rendered-docs or GitHub base if it differs from the default below.

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nvnm-mcp-server-alerts
  namespace: monitoring
  labels:
    app: nvnm-mcp-server
    prometheus: kube-prometheus
spec:
  groups:
    - name: nvnm-mcp-server
      rules:
        - alert: NvnmMCPHighErrorRate
          expr: |
            (
              sum(rate(mcp_server_tool_errors_total[5m]))
              /
              sum(rate(mcp_server_tool_calls_total[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            app: nvnm-mcp-server
          annotations:
            summary: "Inveniam MCP server tool error ratio is elevated"
            description: "The ratio of tool errors to tool calls has exceeded 5% for 5 minutes (current value: {{ $value | humanizePercentage }})."
            runbook_url: "https://github.com/NVNM-Chain/nvnm-mcp-server/blob/main/docs/RUNBOOK.md#inveniam-mcp-high-error-rate"

        - alert: NvnmMCPCriticalErrorRate
          expr: |
            (
              sum(rate(mcp_server_tool_errors_total[5m]))
              /
              sum(rate(mcp_server_tool_calls_total[5m]))
            ) > 0.15
          for: 5m
          labels:
            severity: critical
            app: nvnm-mcp-server
          annotations:
            summary: "Inveniam MCP server tool error ratio is critically high"
            description: "The ratio of tool errors to tool calls has exceeded 15% for 5 minutes (current value: {{ $value | humanizePercentage }})."
            runbook_url: "https://github.com/NVNM-Chain/nvnm-mcp-server/blob/main/docs/RUNBOOK.md#inveniam-mcp-critical-error-rate"

        - alert: NvnmMCPHighP99Latency
          expr: |
            histogram_quantile(
              0.99,
              sum(rate(mcp_server_tool_duration_milliseconds_bucket[5m])) by (le)
            ) > 5000
          for: 5m
          labels:
            severity: warning
            app: nvnm-mcp-server
          annotations:
            summary: "Inveniam MCP server tool p99 latency exceeds 5s"
            description: "The 99th percentile of mcp_server_tool_duration_milliseconds has been above 5000ms for 5 minutes (current value: {{ $value }}ms)."
            runbook_url: "https://github.com/NVNM-Chain/nvnm-mcp-server/blob/main/docs/RUNBOOK.md#inveniam-mcp-high-p99-latency"

        - alert: NvnmMCPHealthCheckFailing
          expr: up{job="nvnm-mcp-server"} == 0
          for: 2m
          labels:
            severity: critical
            app: nvnm-mcp-server
          annotations:
            summary: "Inveniam MCP server scrape target is down"
            description: "Prometheus cannot scrape the nvnm-mcp-server job (up == 0) for 2 minutes. Verify pods, Service, ServiceMonitor scrape config, and metrics port. Health probes: /healthz and /readyz on port 9090."
            runbook_url: "https://github.com/NVNM-Chain/nvnm-mcp-server/blob/main/docs/RUNBOOK.md#inveniam-mcp-health-check-failing"

        - alert: NvnmMCPCircuitBreakerOpen
          expr: max(evm_rpc_circuit_breaker_state) == 2
          for: 1m
          labels:
            severity: critical
            app: nvnm-mcp-server
          annotations:
            summary: "Inveniam MCP server EVM RPC circuit breaker is open"
            description: "evm_rpc_circuit_breaker_state is 2 (open) for at least 1 minute. RPC calls are failing fast; investigate upstream EVM availability and backoff settings."
            runbook_url: "https://github.com/NVNM-Chain/nvnm-mcp-server/blob/main/docs/RUNBOOK.md#inveniam-mcp-circuit-breaker-open"

        - alert: NvnmMCPHighRetryRate
          expr: |
            (
              sum(rate(evm_rpc_retries_total[5m]))
              /
              sum(rate(mcp_server_tool_calls_total[5m]))
            ) > 0.2
          for: 5m
          labels:
            severity: warning
            app: nvnm-mcp-server
          annotations:
            summary: "Inveniam MCP server EVM RPC retry rate is high vs tool calls"
            description: "The ratio of EVM RPC retries to MCP tool calls has exceeded 20% for 5 minutes (current value: {{ $value | humanizePercentage }})."
            runbook_url: "https://github.com/NVNM-Chain/nvnm-mcp-server/blob/main/docs/RUNBOOK.md#inveniam-mcp-high-retry-rate"

        - alert: NvnmMCPRateLimiting
          expr: sum(rate(evm_rpc_rate_limited_total[5m])) > 0
          for: 5m
          labels:
            severity: warning
            app: nvnm-mcp-server
          annotations:
            summary: "Inveniam MCP server is being EVM RPC rate limited"
            description: "evm_rpc_rate_limited_total is increasing over 5 minutes. Reduce request volume or raise RPC quota/limits with the provider."
            runbook_url: "https://github.com/NVNM-Chain/nvnm-mcp-server/blob/main/docs/RUNBOOK.md#inveniam-mcp-rate-limiting"
