apiVersion: v2
name: nvnm-mcp-server
description: Helm chart for the NVNM Chain MCP Server
type: application
# Chart version. Bumped to 0.2.4 alongside appVersion 1.0.0-rc6: the
# rendered output changes because values.yaml gained an explicit
# MCP_KEYLESS_READS env key (#20). Bump independently of appVersion
# when chart templates / values change in a way that affects rendered
# output -- the default image tag changing also counts.
version: 0.2.4
# App version (image tag the chart pulls by default). Tracks
# internal/version/version.go (the canonical app version) and is
# bumped on each release alongside it. Pulls a Cosign-signed manifest
# from ghcr.io/nvnm-chain/nvnm-mcp-server.
appVersion: "1.0.0-rc6"
