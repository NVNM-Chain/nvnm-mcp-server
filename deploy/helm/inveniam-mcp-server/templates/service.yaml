apiVersion: v1
kind: Service
metadata:
  name: {{ include "inveniam-mcp-server.fullname" . }}
  labels:
    {{- include "inveniam-mcp-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: mcp
      port: {{ .Values.service.ports.mcp }}
      targetPort: mcp
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.ports.metrics }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "inveniam-mcp-server.selectorLabels" . | nindent 4 }}
