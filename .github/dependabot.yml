version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # The otel modules version in lockstep; separate PRs conflict on
      # go.sum/vendor and cannot merge independently.
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
