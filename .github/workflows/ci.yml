name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # required for Cosign keyless signing on push to main

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nvnm
          POSTGRES_PASSWORD: nvnm  # pragma: allowlist secret -- ephemeral CI service
          POSTGRES_DB: nvnm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nvnm"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: License headers
        # Phase 9.3: every .go file under cmd/ and internal/ must
        # carry the SPDX-License-Identifier header on its first line.
        # Cheap check; placed before lint so missing-header drift
        # fails fast.
        run: bash scripts/check_license_headers.sh

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.11.4
          args: --timeout=5m
          # Skip `golangci-lint config verify`. That step fetches the
          # config JSON schema from golangci-lint.run at runtime, which
          # makes a required check depend on an external network call --
          # it timed out and red main on 2026-06-13 with no code change.
          # Schema-shape mistakes in .golangci.yml still surface: the
          # lint run itself errors on an unparseable config.
          verify: false

      - name: License scan
        # Hard-refused for proprietary commercial work: GPL-*, LGPL-*,
        # AGPL-* in all variants. All other entries are routine
        # permissive licenses. go-ethereum (LGPL-3.0 under static
        # linking) was replaced with github.com/defiweb/go-eth (MIT)
        # in the swap recorded in docs/SECURITY_AUDIT.md.
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... \
            --ignore github.com/NVNM-Chain/nvnm-mcp-server \
            --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-2-Clause-FreeBSD,BSD-3-Clause,ISC,MPL-2.0,Unlicense,CC0-1.0,0BSD,Zlib,EPL-2.0,CDDL-1.0

      - name: Vulnerability check
        run: |
          # Pinned, not @latest: govulncheck@v1.4.0 pulls golang.org/x/tools
          # @v0.46.0, which panics under Go 1.26.4 ("ForEachElement called on
          # type containing *types.TypeParam"). v1.3.0 (x/tools v0.44.0) is the
          # known-good combo. The vuln DB is fetched at runtime from
          # vuln.go.dev, so freshness is independent of the scanner version.
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

      - name: Test
        # -mod=vendor pins the dep tree to the committed vendor/
        # directory. Supply-chain hardening: a compromised upstream
        # cannot affect a build that succeeds locally.
        env:
          NVNM_TEST_PG_DSN: postgres://nvnm:nvnm@localhost:5432/nvnm_test?sslmode=disable  # pragma: allowlist secret -- ephemeral CI service
        run: go test -mod=vendor -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -mod=vendor -o bin/nvnm-mcp-server ./cmd/nvnm-mcp-server

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.out

      - name: Generate SBOM
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json
          upload-artifact: true

      - name: Install Cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign-blob --yes bin/nvnm-mcp-server

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install detect-secrets
        # Pinned to the same version as the detect-secrets pre-commit hook
        # (.pre-commit-config.yaml) so CI and local scans agree.
        run: pip install detect-secrets==1.5.0

      - name: Scan tracked files against the baseline
        # Server-side mirror of the detect-secrets pre-commit hook: a secret
        # not present in .secrets.baseline fails the build, so a contributor
        # who skipped the local hook (or used --no-verify) cannot land a
        # secret. Excludes match .pre-commit-config.yaml.
        run: |
          git ls-files \
            | grep -vE '^(build/|dist/|coverage\.html$|\.golangci-lint-cache/)' \
            | xargs detect-secrets-hook --baseline .secrets.baseline
