name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # required for Cosign keyless signing on push to main

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: License scan
        # Hard-refused for proprietary commercial work: GPL-*, LGPL-*,
        # AGPL-* in all variants. All other entries are routine
        # permissive licenses. go-ethereum (LGPL-3.0 under static
        # linking) was replaced with github.com/defiweb/go-eth (MIT)
        # in the swap recorded in docs/SECURITY_AUDIT.md.
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... \
            --ignore github.com/inveniam/nvnm-mcp-server \
            --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-2-Clause-FreeBSD,BSD-3-Clause,ISC,MPL-2.0,Unlicense,CC0-1.0,0BSD,Zlib,EPL-2.0,CDDL-1.0

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Test
        # -mod=vendor pins the dep tree to the committed vendor/
        # directory. Supply-chain hardening: a compromised upstream
        # cannot affect a build that succeeds locally.
        run: go test -mod=vendor -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -mod=vendor -o bin/nvnm-mcp-server ./cmd/nvnm-mcp-server

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

      - name: Generate SBOM
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json
          upload-artifact: true

      - name: Install Cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign-blob --yes bin/nvnm-mcp-server
