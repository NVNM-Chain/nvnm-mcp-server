name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release and upload assets
  id-token: write   # required for Cosign keyless signing via Sigstore OIDC

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN="dist/nvnm-mcp-server-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/NVNM-Chain/nvnm-mcp-server/internal/version.Version=${{ steps.version.outputs.version }}" \
            -o "$BIN" \
            ./cmd/nvnm-mcp-server
          echo "bin=$BIN" >> "$GITHUB_ENV"

      - name: Generate SBOM for binary
        uses: anchore/sbom-action@v0
        with:
          file: ${{ env.bin }}
          format: cyclonedx-json
          artifact-name: sbom-${{ matrix.os }}-${{ matrix.arch }}.cyclonedx.json
          output-file: ${{ env.bin }}.sbom.cyclonedx.json
          upload-artifact: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binary
        run: |
          cosign sign-blob --yes --output-signature "${{ env.bin }}.sig" --output-certificate "${{ env.bin }}.cert.pem" "${{ env.bin }}"

      - name: Compute checksums
        run: |
          cd dist
          shasum -a 256 "$(basename "${{ env.bin }}")" > "$(basename "${{ env.bin }}").sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Determine pre-release flag
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-rc."* || "${GITHUB_REF_NAME}" == *"-beta"* || "${GITHUB_REF_NAME}" == *"-alpha"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE=release-notes.md
          if [ -f CHANGELOG.md ]; then
            awk -v ver="[$VERSION]" '
              $0 ~ "^## " ver { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md > "$NOTES_FILE"
            if [ -s "$NOTES_FILE" ]; then
              echo "Extracted notes for $VERSION from CHANGELOG.md"
            else
              echo "No CHANGELOG.md entry for $VERSION; using auto-generated notes." > "$NOTES_FILE"
            fi
          else
            echo "No CHANGELOG.md present; using auto-generated notes." > "$NOTES_FILE"
          fi
          {
            echo ""
            echo "---"
            echo ""
            echo "## Verifying signatures"
            echo ""
            echo "Each binary is shipped with a Cosign keyless signature (via Sigstore OIDC) and a SHA-256 checksum."
            echo ""
            echo '```bash'
            echo "# Verify checksum"
            echo "shasum -a 256 -c nvnm-mcp-server-${GITHUB_REF_NAME}-<os>-<arch>.sha256"
            echo ""
            echo "# Verify Cosign signature"
            echo "cosign verify-blob \\"
            echo "  --certificate nvnm-mcp-server-${GITHUB_REF_NAME}-<os>-<arch>.cert.pem \\"
            echo "  --signature nvnm-mcp-server-${GITHUB_REF_NAME}-<os>-<arch>.sig \\"
            echo "  --certificate-identity-regexp 'https://github.com/NVNM-Chain/nvnm-mcp-server/.*' \\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
            echo "  nvnm-mcp-server-${GITHUB_REF_NAME}-<os>-<arch>"
            echo '```'
          } >> "$NOTES_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: true
