name: Image

# Builds multi-arch (linux/amd64 + linux/arm64) container images and
# signs them keyless via Cosign / Sigstore. Tags follow docker/metadata
# convention: branch refs (`:main`), short SHA (`:sha-<7>`), semver from
# Git tags (`:v1.2.3`, `:1.2`, `:1`). Pull requests build but do NOT
# push, so a Dockerfile regression fails the PR before it can land.
#
# Registry: GHCR is the registry of record (chosen 2026-05-18, Phase 9
# OSS decision). The repo's default GITHUB_TOKEN scopes packages:write so
# no PAT is required.
#
# Optional Docker Hub mirror: when the repo VARIABLE `DOCKERHUB_IMAGE` is
# set (e.g. "docker.io/<org>/nvnm-mcp-server"), every tag is also pushed
# to Docker Hub and Cosign-signed there. It additionally requires the repo
# SECRETS `DOCKERHUB_USERNAME` and `DOCKERHUB_TOKEN` (a Docker Hub access
# token). If the variable is unset, the workflow pushes to GHCR only --
# the mirror degrades gracefully and never blocks a release. (Existing
# tags are NOT backfilled to Docker Hub; copy them once with
# `docker buildx imagetools create -t docker.io/<org>/nvnm-mcp-server:1.0.0-rc7
# ghcr.io/nvnm-chain/nvnm-mcp-server:1.0.0-rc7`.)
#
# Phase 9.7. Companion to the existing release.yml which signs binaries.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # push to ghcr.io
  id-token: write   # Cosign keyless OIDC

env:
  REGISTRY: ghcr.io
  # Image namespace tracks the current GitHub org. Updated at repo
  # transfer time (Phase 9.14); the Dockerfile itself is path-agnostic.
  IMAGE_NAME: nvnm-chain/nvnm-mcp-server

jobs:
  image:
    name: Build & sign multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        # QEMU emulates the non-native arch (arm64 on amd64 runners) so
        # buildx can produce both platform artifacts from one runner.
        #
        # v4 (2026-03-04) defaults to Node.js 24, dropping Node.js 20
        # ahead of the 2026-09-16 runner cutover. Bare invocation here,
        # so no input-shape change to worry about.
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        # v4 (2026-03-05) defaults to Node.js 24 and removes some
        # deprecated inputs/outputs (none used here -- this is a bare
        # invocation, so the bump is drop-in).
        uses: docker/setup-buildx-action@v4

      - name: Compute image list
        # GHCR is always a target (the registry of record). Docker Hub is
        # an OPTIONAL mirror: it is added only when the repo variable
        # DOCKERHUB_IMAGE is set (e.g. "docker.io/<org>/nvnm-mcp-server").
        # When it is unset the workflow behaves exactly as GHCR-only, so a
        # missing-mirror config never breaks a release. The mirror also
        # needs the DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets (see the
        # Docker Hub login step).
        id: images
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
        run: |
          set -euo pipefail
          IMAGES="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          if [ -n "${DOCKERHUB_IMAGE}" ]; then
            IMAGES="${IMAGES}"$'\n'"${DOCKERHUB_IMAGE}"
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "list<<EOF"
            echo "${IMAGES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: meta
        # v6 (2026-03-05) defaults to Node.js 24. The only behaviour
        # change called out is that `#` inside list-input values is now
        # preserved (full-line `#` still comments). Our `tags` list
        # has no `#` chars, so this is a no-op for us.
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Login to GHCR
        # Skip on pull_request: we build to verify, but never push from
        # an untrusted PR head. Forks would not have packages:write
        # anyway, so this also keeps the workflow green for outside
        # contributors.
        if: github.event_name != 'pull_request'
        # v4 (2026-03-04) defaults to Node.js 24. No input-shape change
        # for the registry/username/password inputs we use.
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (mirror)
        # Only runs when the Docker Hub mirror is configured (DOCKERHUB_IMAGE
        # variable set, from the Compute image list step) and we are pushing
        # (not a PR). Requires repo secrets DOCKERHUB_USERNAME and
        # DOCKERHUB_TOKEN (a Docker Hub access token, not the account
        # password). If unset, the workflow pushes to GHCR only.
        if: github.event_name != 'pull_request' && steps.images.outputs.dockerhub == 'true'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push multi-arch image
        id: build
        # v7 (2026-03-05) defaults to Node.js 24. Breaking changes
        # called out: removal of the deprecated `DOCKER_BUILD_NO_SUMMARY`
        # and `DOCKER_BUILD_EXPORT_RETENTION_DAYS` env vars. We set
        # neither (no `env:` on this step), so the bump is drop-in.
        # The `context`/`platforms`/`push`/`tags`/`labels`/`provenance`/
        # `sbom`/`cache-from`/`cache-to` inputs we pass are unchanged
        # across v6 -> v7.
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Buildx provenance + SBOM attestations are attached to the
          # image manifest and surface in `docker buildx imagetools
          # inspect`. They are the supply-chain layer above the Cosign
          # signature.
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image manifest
        # Sign the multi-arch manifest at its content-addressable digest.
        # Each tag in steps.meta.outputs.tags resolves to the same
        # digest for this build, so signing once is sufficient -- but
        # we walk the tag list anyway so a verifier who knows only a
        # tag (not the digest) can resolve through it.
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            echo "Signing ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done
