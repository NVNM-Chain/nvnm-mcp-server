name: Image

# Builds multi-arch (linux/amd64 + linux/arm64) container images and
# signs them keyless via Cosign / Sigstore. Tags follow docker/metadata
# convention: branch refs (`:main`), short SHA (`:sha-<7>`), semver from
# Git tags (`:v1.2.3`, `:1.2`, `:1`). Pull requests build but do NOT
# push, so a Dockerfile regression fails the PR before it can land.
#
# Registry: GHCR is the SOLE registry this workflow publishes to (chosen
# 2026-05-18, Phase 9 OSS decision). The repo's default GITHUB_TOKEN
# scopes packages:write so no PAT is required. The build/push/sign steps
# are FATAL -- they gate the job.
#
# This workflow deliberately holds NO credentials for any registry other
# than GHCR, and pushes to no other registry. An earlier revision carried
# an opt-in Docker Hub mirror; it was never enabled, and it was removed
# (2026-07-14) rather than left dormant. Rationale: this repository is
# headed for public release, and a workflow that can authenticate to a
# private registry is a standing supply-chain liability -- a malicious PR
# or a compromised Action only has to reach a step that already holds the
# token. Publishing to a second registry is a deliberate, manual,
# human-performed act; it is not automated from here.
#
# Phase 9.7. Companion to the existing release.yml which signs binaries.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  # Image namespace tracks the current GitHub org. Updated at repo
  # transfer time (Phase 9.14); the Dockerfile itself is path-agnostic.
  IMAGE_NAME: nvnm-chain/nvnm-mcp-server

jobs:
  image:
    name: Build & sign multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io
      id-token: write   # Cosign keyless OIDC (SC-3: scoped to this job)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        # QEMU emulates the non-native arch (arm64 on amd64 runners) so
        # buildx can produce both platform artifacts from one runner.
        #
        # v4 (2026-03-04) defaults to Node.js 24, dropping Node.js 20
        # ahead of the 2026-09-16 runner cutover. Bare invocation here,
        # so no input-shape change to worry about.
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        # v4 (2026-03-05) defaults to Node.js 24 and removes some
        # deprecated inputs/outputs (none used here -- this is a bare
        # invocation, so the bump is drop-in).
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Compute image tags
        id: meta
        # GHCR only -- this is the only registry the workflow publishes to.
        #
        # v6 (2026-03-05) defaults to Node.js 24. The only behaviour
        # change called out is that `#` inside list-input values is now
        # preserved (full-line `#` still comments). Our `tags` list
        # has no `#` chars, so this is a no-op for us.
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Login to GHCR
        # Skip on pull_request: we build to verify, but never push from
        # an untrusted PR head. Forks would not have packages:write
        # anyway, so this also keeps the workflow green for outside
        # contributors. This is the only registry login in the workflow.
        if: github.event_name != 'pull_request'
        # v4 (2026-03-04) defaults to Node.js 24. No input-shape change
        # for the registry/username/password inputs we use.
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch image (GHCR)
        id: build
        # v7 (2026-03-05) defaults to Node.js 24. Breaking changes
        # called out: removal of the deprecated `DOCKER_BUILD_NO_SUMMARY`
        # and `DOCKER_BUILD_EXPORT_RETENTION_DAYS` env vars. We set
        # neither (no `env:` on this step), so the bump is drop-in.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inject the version into the binary. Without this the Dockerfile's
          # ARG VERSION defaults to "dev" and the served serverInfo.version
          # does not match the image tag. metadata-action's `version` output is
          # the primary computed version: the semver for a tag build (e.g.
          # "1.0.0-rc13"), the branch name or "pr-N" otherwise. release.yml
          # already injects this for the standalone binaries; the image build
          # was the one path that did not.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          # Buildx provenance + SBOM attestations are attached to the
          # image manifest and surface in `docker buildx imagetools
          # inspect`. They are the supply-chain layer above the Cosign
          # signature.
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image manifest (GHCR)
        # Sign the multi-arch manifest at its content-addressable digest.
        # Each tag in steps.meta.outputs.tags resolves to the same
        # digest for this build, so signing once is sufficient -- but
        # we walk the tag list anyway so a verifier who knows only a
        # tag (not the digest) can resolve through it. FATAL: this gates
        # the job.
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            echo "Signing ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done
