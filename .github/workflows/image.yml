name: Image

# Builds multi-arch (linux/amd64 + linux/arm64) container images and
# signs them keyless via Cosign / Sigstore. Tags follow docker/metadata
# convention: branch refs (`:main`), short SHA (`:sha-<7>`), semver from
# Git tags (`:v1.2.3`, `:1.2`, `:1`). Pull requests build but do NOT
# push, so a Dockerfile regression fails the PR before it can land.
#
# Registry: GHCR is the registry of record (chosen 2026-05-18, Phase 9
# OSS decision). The repo's default GITHUB_TOKEN scopes packages:write so
# no PAT is required. The GHCR build/push/sign steps are FATAL -- they
# gate the job.
#
# Optional Docker Hub mirror: when the repo VARIABLE `DOCKERHUB_IMAGE` is
# set (e.g. "docker.io/<org>/nvnm-mcp-server"), each GHCR tag is mirrored
# to Docker Hub by re-tagging the *already-built* GHCR manifest with
# `docker buildx imagetools create` (no rebuild) and Cosign-signed there.
# The mirror requires the repo SECRETS `DOCKERHUB_USERNAME` and
# `DOCKERHUB_TOKEN` (a Docker Hub access token with Read & Write scope --
# a narrower token cannot pull buildkit helper images and will fail).
#
# The mirror is fully decoupled from the GHCR publish: its login/mirror/
# sign steps are `continue-on-error`, and -- critically -- the GHCR build
# never logs into Docker Hub, so a missing/typo'd DOCKERHUB_IMAGE or a
# bad DOCKERHUB_TOKEN can NEVER break the registry-of-record publish or
# red the branch. A misconfigured mirror surfaces as an amber (non-fatal)
# step, not a failed job. This realizes the original "mirror degrades
# gracefully and never blocks a release" intent (an earlier coupled
# design pushed both registries in one build step, so a bad Docker Hub
# token took the GHCR publish down with it).
#
# Backfill (one-time, manual) -- copy an existing tag to Docker Hub:
#   docker buildx imagetools create \
#     -t docker.io/<org>/nvnm-mcp-server:1.0.0-rc9 \
#     ghcr.io/nvnm-chain/nvnm-mcp-server:1.0.0-rc9
#
# Phase 9.7. Companion to the existing release.yml which signs binaries.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # push to ghcr.io
  id-token: write   # Cosign keyless OIDC

env:
  REGISTRY: ghcr.io
  # Image namespace tracks the current GitHub org. Updated at repo
  # transfer time (Phase 9.14); the Dockerfile itself is path-agnostic.
  IMAGE_NAME: nvnm-chain/nvnm-mcp-server

jobs:
  image:
    name: Build & sign multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        # QEMU emulates the non-native arch (arm64 on amd64 runners) so
        # buildx can produce both platform artifacts from one runner.
        #
        # v4 (2026-03-04) defaults to Node.js 24, dropping Node.js 20
        # ahead of the 2026-09-16 runner cutover. Bare invocation here,
        # so no input-shape change to worry about.
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        # v4 (2026-03-05) defaults to Node.js 24 and removes some
        # deprecated inputs/outputs (none used here -- this is a bare
        # invocation, so the bump is drop-in).
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Detect Docker Hub mirror
        # The mirror is OPT-IN: enabled only when the repo variable
        # DOCKERHUB_IMAGE is set (e.g. "docker.io/<org>/nvnm-mcp-server").
        # When unset, every mirror step below is skipped and the workflow
        # is exactly GHCR-only. This step only sets a boolean; it never
        # touches the GHCR build path.
        id: mirror
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
        run: |
          set -euo pipefail
          if [ -n "${DOCKERHUB_IMAGE}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image tags
        id: meta
        # GHCR only. The Docker Hub mirror derives its tags from these by
        # swapping the registry/repo prefix (see the mirror step), so the
        # tag suffixes stay identical across registries.
        #
        # v6 (2026-03-05) defaults to Node.js 24. The only behaviour
        # change called out is that `#` inside list-input values is now
        # preserved (full-line `#` still comments). Our `tags` list
        # has no `#` chars, so this is a no-op for us.
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Login to GHCR
        # Skip on pull_request: we build to verify, but never push from
        # an untrusted PR head. Forks would not have packages:write
        # anyway, so this also keeps the workflow green for outside
        # contributors. NOTE: we do NOT log into Docker Hub here -- the
        # GHCR build must stay independent of Docker Hub credentials so a
        # bad mirror token cannot break it (buildx pulls public helper
        # images like buildkit-syft-scanner during the build; doing so
        # through a narrow-scope Docker Hub login 401s).
        if: github.event_name != 'pull_request'
        # v4 (2026-03-04) defaults to Node.js 24. No input-shape change
        # for the registry/username/password inputs we use.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch image (GHCR)
        id: build
        # v7 (2026-03-05) defaults to Node.js 24. Breaking changes
        # called out: removal of the deprecated `DOCKER_BUILD_NO_SUMMARY`
        # and `DOCKER_BUILD_EXPORT_RETENTION_DAYS` env vars. We set
        # neither (no `env:` on this step), so the bump is drop-in.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Buildx provenance + SBOM attestations are attached to the
          # image manifest and surface in `docker buildx imagetools
          # inspect`. They are the supply-chain layer above the Cosign
          # signature.
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image manifest (GHCR)
        # Sign the multi-arch manifest at its content-addressable digest.
        # Each tag in steps.meta.outputs.tags resolves to the same
        # digest for this build, so signing once is sufficient -- but
        # we walk the tag list anyway so a verifier who knows only a
        # tag (not the digest) can resolve through it. FATAL: this gates
        # the job.
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            echo "Signing ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      # --- Docker Hub mirror (best-effort; never gates the job) --------------
      # All three steps below are continue-on-error and run only when the
      # mirror is enabled and we are pushing. A bad token / wrong image name
      # fails these softly (amber) without touching the GHCR publish above.

      - name: Login to Docker Hub (mirror)
        if: github.event_name != 'pull_request' && steps.mirror.outputs.enabled == 'true'
        continue-on-error: true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Mirror to Docker Hub + sign
        # Re-tag the already-built GHCR manifest onto Docker Hub with
        # `imagetools create` (no rebuild), then Cosign-sign it. The
        # mirrored manifest is content-identical, so it carries the same
        # digest -- we sign that same DIGEST on the Docker Hub ref.
        if: github.event_name != 'pull_request' && steps.mirror.outputs.enabled == 'true'
        continue-on-error: true
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          echo "Mirroring GHCR tags to ${DOCKERHUB_IMAGE} (best-effort)"
          for tag in $TAGS; do
            suffix="${tag##*:}"
            dst="${DOCKERHUB_IMAGE}:${suffix}"
            echo "Mirroring ${tag} -> ${dst}"
            docker buildx imagetools create -t "${dst}" "${tag}"
            echo "Signing ${dst}@${DIGEST}"
            cosign sign --yes "${dst}@${DIGEST}"
          done
